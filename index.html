<!DOCTYPE html>
<html lang="en">
<head>
    <title>skmath</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, maximum-scale=1.0">
    <style>
        @import url(/fonts/alike.min.css);
        @import "/normalize.min.css";
        body {
            width: 32em;
            margin: 7.5em auto;
            font-family: 'Alike', 'Baskerville', serif;
            background-color: #fafafa;
            color: #222;
            text-align: justify;
        }
        h1 {
            color: #840000;
            text-align: center;
            font-weight: normal;
        }
        h2 {
            color: #444;
            text-align: left;
            font-weight: normal;
        }
        h1, h2 {
            font-kerning: normal;
        }
        p {
            font-kerning: normal;
            font-variant-ligatures: common-ligatures;
        }
        header h2 {
            font-size: 1em;
            font-style: italic;
            text-align: center;
            margin: -1em auto 2em auto;
        }
        a {
            color: #9f1111;
            text-decoration: none;
            text-shadow: 1px 1px 1px #eee;
        }
        a:hover {
            color: #ee4444;
        }
        pre, tt, code {
            font-family: monospace;
        }
        img {
            max-width: 100%;
        }
        footer {
            text-align: center;
            font-size: smaller;
            font-style: italic;
            margin-top: 3em;
        }
    </style>
</head>
<body>
    <header>
        <h1>skmath</h1>
        <h2>Improved and new math commands</h2>
    </header>
    <p><small>Other LaTeX packages I maintain include <a href="http://projects.sigurdhsson.org/skrapport">skrapport</a>, <a href="http://projects.sigurdhsson.org/skdoc">skdoc</a> and <a href="http://github.com/urdh/download">download</a>.</a></small></p>
    <p>This LaTeX package provides new and improved commands for typesetting mathematics more elegantly. Read <a href="https://github.com/urdh/skmath/blob/master/skmath.pdf">the documentation</a> for more information.</p>
    <footer>
        <p>This <a href="http://projects.sigurdhsson.org/">project</a> by <a href="http://sigurdhsson.org/">me</a> is hosted by <a href="http://github.com/urdh/skmath">Github</a>.</p>
    </footer>
</body>
</html>
